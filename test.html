<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TriaxisCoSo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#071d8f;
overflow-x:hidden;
color:white;
}

/* HERO */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
overflow:hidden;
}

/* Background Video */

.bg-video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* Blue Overlay */

.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
90deg,
rgba(7,29,143,.95),
rgba(7,29,143,.70),
rgba(7,29,143,.15)
);
z-index:-2;
}

/* Content */

.content{
max-width:550px;
z-index:2;
}

.content h1{
font-size:64px;
margin-bottom:20px;
}

.content p{
font-size:22px;
line-height:1.6;
opacity:.9;
margin-bottom:35px;
}

button{
padding:18px 50px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
background:white;
color:#1430b6;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:translateY(-4px);
}

/* Floating Video */

.video-frame{

width:600px;
height:380px;

overflow:hidden;

border-radius:6px;

box-shadow:0 30px 60px rgba(0,0,0,.35);

position:relative;

animation:float 5s ease-in-out infinite;

}

.video-frame video{

width:100%;
height:100%;
object-fit:cover;

opacity:.92;

}

/* Floating Animation */

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}

}

</style>

</head>
<body>

<section class="hero">

<video class="bg-video" autoplay muted loop playsinline>
<source src="city.mp4" type="video/mp4">
</video>

<div class="content">

<h1>Triaxis Corporate Solutions</h1>

<p><color='#FFD700'>
Empowering business success
</color></p>

<button>Explore</button>

</div>

<div class="video-frame">

<video autoplay muted loop playsinline>

<source src="city.mp4" type="video/mp4">

</video>

</div>

</section>

</body>
</html>
